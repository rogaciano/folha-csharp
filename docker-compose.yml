services:
  postgres:
    image: postgres:17
    container_name: rh-folha-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rh_folha}
      POSTGRES_USER: ${POSTGRES_USER:-rh_folha_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rh_folha_dev_password}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rh_folha_user} -d ${POSTGRES_DB:-rh_folha}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
